<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore</title>
    <link rel="stylesheet" href="../cssfolders/explore.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="app-header glass">
    <nav class="navbar">
      <span class="nav-link" onclick="goToDashboard()">Dashboard</span>
      <span class="nav-link active" onclick="goToExplore()">Explore</span>
      <span class="nav-link" onclick="goToFavourites()">Favourites</span>
    </nav>
  </header>

  <main class="page">
    <section class="container">
      <p class="label">Pokédex Explorer</p>
      <h1>Find your next battle partner</h1>
      <p class="subtitle">Search by name and filter by Pokémon type.</p>

      <section class="controls">
        <input
          id="searchInput"
          class="input"
          type="text"
          placeholder="Search by name (e.g. pikachu)"
        />

        <select id="typeSortSelect" class="select">
          <option value="all">Type: All</option>
        </select>
      </section>
    </section>

    <section class="grid" id="pokemonContainer"></section>
  </main>

  <script src="../navigation.js"></script>
  <script src="../jsfolders/favourites-storage.js"></script>
  <script src="../jsfolders/explore.js"></script>
</body>
</html>
