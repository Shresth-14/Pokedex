<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokedex</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

<header class="app-header glass">

  <nav class="navbar">
    <span class="nav-link active" onclick="goToDashboard()">Dashboard</span>
    <span class="nav-link" onclick="goToExplore()">Explore</span>
    <span class="nav-link" onclick="goToFavourites()">Favourites</span>
  </nav>
</header>
<main class="dashboard-main">
  <section class="hero-card">
    <img src="images/pokedex.jpeg" alt="Pokédex" class="pokedex-image" />

    <div class="hero-actions">
      <button type="button" class="hero-btn primary" onclick="goToExplore()">Explore Pokémon</button>
      <button type="button" class="hero-btn secondary" onclick="goToFavourites()">Go to Favourites</button>
    </div>
  </section>
</main>

<script src="navigation.js"></script>

</body>
</html>
